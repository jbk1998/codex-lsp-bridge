name: Bug report
description: Report a reproducible problem in codex-lsp-bridge.
title: "bug: "
labels: ["bug", "needs reproduction"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail for maintainers to reproduce the behavior without guessing.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: "Diagnostics timed out for a clean TypeScript file..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect codex-lsp-bridge to return or do?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include exact output, status, error message, or MCP response.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: codex-lsp-bridge version
      placeholder: "0.1.2"
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: Language server
      options:
        - TypeScript / JavaScript
        - Rust
        - Python
        - Go
        - Other
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Run `codex-lsp-bridge doctor --root .` in the affected workspace.
      render: json
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands, tool arguments, workspace root, and file path. Redact private paths if needed, but keep the shape.
      placeholder: |
        1. Run ...
        2. Call lsp_diagnostics with ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Include package manager, monorepo layout, tsconfig/project references, or language server version if relevant.
